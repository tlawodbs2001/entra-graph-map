<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Access Inventory Viewer</title><style>
:root{--bg:#f4f7fb;--ink:#15233b;--muted:#60708a;--line:#d9e3f0;--card:#fff;--accent:#2563eb;--warn:#b45309;--bad:#b42318}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:"Segoe UI","Noto Sans KR",Arial,sans-serif;color:var(--ink)}header{padding:28px max(20px,calc((100vw - 1200px)/2));background:linear-gradient(120deg,#101c32,#28529b);color:white}h1{font-size:24px;margin:0}header p{margin:8px 0 0;color:#d9e7ff}.wrap{max-width:1200px;margin:auto;padding:20px}.load{display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:#fff;border:1px solid var(--line);padding:14px;border-radius:14px}.button{border:1px solid #9bb8ef;background:#edf4ff;color:#174ea6;padding:10px 12px;border-radius:9px;font-weight:700;cursor:pointer}.status{font-size:13px;color:var(--muted)}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:16px 0}.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px}.metric{font-size:26px;font-weight:750;margin:8px 0}.label{font-size:12px;color:var(--muted)}.tabs{display:flex;gap:8px;overflow:auto;margin:16px 0}.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 12px;cursor:pointer;white-space:nowrap}.tab.active{background:#eaf2ff;border-color:#93b5ef;color:#174ea6}.panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}.panel h2{margin:0 0 12px;font-size:17px}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse;font-size:13px}.table th,.table td{padding:10px;border-bottom:1px solid #e7edf6;text-align:left;vertical-align:top}.table th{background:#f8fbff;color:#52647f;font-weight:700;position:sticky;top:0}.pill{display:inline-block;padding:3px 7px;border-radius:999px;background:#edf4ff;color:#174ea6;font-size:11px}.warn{color:var(--warn)}.error{color:var(--bad)}.empty{padding:28px;color:var(--muted);text-align:center}@media(max-width:760px){.summary{grid-template-columns:repeat(2,1fr)}.wrap{padding:14px}}
</style></head><body><header><h1>UPN 기반 종합 권한 조회 결과</h1><p>로컬 JSON 결과를 불러와 Entra, Azure, SharePoint/OneDrive 조사 결과를 검토합니다.</p></header><main class="wrap"><div class="load"><input id="file" type="file" accept="application/json"><button id="sample" class="button">샘플 데이터 보기</button><span id="status" class="status">결과 JSON을 선택하십시오.</span></div><section class="summary" id="summary"></section><nav class="tabs" id="tabs"></nav><section class="panel" id="panel"><div class="empty">데이터를 불러오면 결과가 표시됩니다.</div></section></main><script>
let data=null,active='overview';const $=s=>document.querySelector(s);const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const tabs=[['overview','개요'],['memberships','그룹/역할'],['owners','소유 객체'],['apps','앱 권한'],['azure','Azure RBAC'],['sharepoint','SharePoint/OneDrive'],['errors','수집 오류']];
function arr(v){return Array.isArray(v)?v:(v?.value||[])}
function render(){if(!data)return;const i=data.inventory||{},e=i.entra||{},a=i.azure||{},s=i.sharePointOneDrive||{};const count=x=>arr(x).length;$('#summary').innerHTML=[['대상 사용자',data.target?.displayName||data.target?.userPrincipalName||'-'],['직접 멤버십',count(e.directMembership)],['PIM 활성 역할',count(e.pimActiveRoleAssignments)],['Azure RBAC',count(a.assignments)],['소유 객체',count(e.ownedObjects)],['앱 역할',count(e.appRoleAssignments)],['OneDrive',s.drive?.id?'확인됨':'미확인'],['오류',count(i.errors)]].map(([l,v])=>`<div class="card"><div class="label">${esc(l)}</div><div class="metric">${esc(v)}</div></div>`).join('');$('#tabs').innerHTML=tabs.map(([id,label])=>`<button class="tab ${active===id?'active':''}" data-tab="${id}">${label}</button>`).join('');document.querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>{active=b.dataset.tab;renderPanel();$('#tabs').querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===b))});renderPanel()}
function table(rows,cols){if(!rows.length)return '<div class="empty">표시할 결과가 없습니다.</div>';return `<div class="table-wrap"><table class="table"><thead><tr>${cols.map(c=>`<th>${c[0]}</th>`).join('')}</tr></thead><tbody>${rows.map(r=>`<tr>${cols.map(c=>`<td>${c[1](r)}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function typeName(x){return (x?.['@odata.type']||'').replace('#microsoft.graph.','')}
function renderPanel(){const i=data.inventory||{},e=i.entra||{},a=i.azure||{},s=i.sharePointOneDrive||{};let html='';if(active==='overview'){html=`<h2>대상 정보</h2>${table([data.target||{}],[['표시 이름',r=>esc(r.displayName)],['UPN',r=>esc(r.userPrincipalName)],['유형',r=>esc(r.userType)],['회사',r=>esc(r.companyName)],['활성',r=>esc(r.accountEnabled)],['생성일',r=>esc(r.createdDateTime)]])}`}if(active==='memberships'){const rows=[...arr(e.directMembership).map(r=>({...r,kind:'직접'})),...arr(e.transitiveMembership).map(r=>({...r,kind:'전이'})),...arr(e.pimActiveRoleAssignments).map(r=>({displayName:r.roleDefinition?.displayName||r.roleDefinitionId,kind:'PIM 활성',type:'directoryRole',scope:r.directoryScopeId||'/'}))];html=`<h2>그룹 · 디렉터리 역할 · PIM 활성 역할</h2>${table(rows,[['경로',r=>`<span class="pill">${esc(r.kind)}</span>`],['유형',r=>esc(r.type||typeName(r))],['이름',r=>esc(r.displayName)],['범위/ID',r=>esc(r.scope||r.id)]])}`}if(active==='owners'){html=`<h2>소유 객체</h2>${table(arr(e.ownedObjects),[['유형',r=>esc(typeName(r))],['객체명',r=>esc(r.displayName)],['객체 ID',r=>esc(r.id)]])}`}if(active==='apps'){html=`<h2>엔터프라이즈 앱 역할</h2>${table(arr(e.appRoleAssignments),[['리소스',r=>esc(r.resourceDisplayName)],['역할 ID',r=>esc(r.appRoleId)],['리소스 ID',r=>esc(r.resourceId)],['할당 ID',r=>esc(r.id)]])}`}if(active==='azure'){html=`<h2>Azure RBAC</h2>${table(arr(a.assignments),[['구독',r=>esc(r.subscriptionName)],['역할',r=>r.isOwner?`<b class="warn">Owner</b>`:esc(r.roleName)],['범위',r=>esc(r.scope)],['주체 유형',r=>esc(r.principalType)],['할당 유형',r=>esc(r.assignmentType)]])}`}if(active==='sharepoint'){html=`<h2>SharePoint / OneDrive</h2><p class="status">${esc(s.collectionScope||'지정 범위 결과를 불러오면 표시됩니다.')}</p>${table(s.drive?[s.drive]:[],[['드라이브',r=>esc(r.driveType)],['URL',r=>esc(r.webUrl)],['용량',r=>esc(r.quota?.total)],['드라이브 ID',r=>esc(r.id)]])}`}if(active==='errors'){html=`<h2>수집 오류 및 제한</h2>${table(arr(i.errors),[['영역',r=>`<span class="error">${esc(r.scope)}</span>`],['메시지',r=>esc(r.message)],['권장 조치',r=>esc(r.remediation)]])}`}$('#panel').innerHTML=html}
$('#file').onchange=async e=>{const f=e.target.files[0];if(!f)return;try{data=JSON.parse(await f.text());$('#status').textContent=`불러옴: ${f.name}`;render()}catch(err){$('#status').textContent='JSON 형식 오류: '+err.message}};
$('#sample').onclick=()=>{data={target:{displayName:'홍길동',userPrincipalName:'hong@contoso.com',userType:'Member',companyName:'Contoso',accountEnabled:true},inventory:{entra:{directMembership:[{'@odata.type':'#microsoft.graph.group',displayName:'IT-Admin',id:'group-1'}],pimActiveRoleAssignments:[{roleDefinition:{displayName:'Authentication Administrator'},directoryScopeId:'/'}],ownedObjects:[{'@odata.type':'#microsoft.graph.group',displayName:'M365-Project-A',id:'group-2'}],appRoleAssignments:[{resourceDisplayName:'ServiceNow',appRoleId:'role-1',resourceId:'app-1'}]},azure:{assignments:[{subscriptionName:'Test Subscription',roleName:'Reader',scope:'/subscriptions/test',principalType:'User',assignmentType:'Direct',isOwner:false}]},sharePointOneDrive:{drive:{id:'drive-1',driveType:'business',webUrl:'https://contoso-my.sharepoint.com/',quota:{total:1099511627776}},collectionScope:'OneDrive 메타데이터 예시'},errors:[]}};$('#status').textContent='샘플 데이터 표시 중';render()};
</script></body></html>
