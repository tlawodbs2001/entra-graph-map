<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Entra RBAC 지도</title><style>
:root{--bg:#f5f7fb;--ink:#17233a;--muted:#61708a;--line:#dbe4f1;--blue:#2563eb;--card:#fff}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:"Segoe UI","Noto Sans KR",Arial,sans-serif;color:var(--ink)}header{padding:30px max(20px,calc((100vw - 1180px)/2));background:linear-gradient(120deg,#0e1b33,#294f95);color:#fff}h1{margin:0;font-size:26px}header p{margin:8px 0 0;color:#dce8ff}.wrap{max-width:1180px;margin:auto;padding:20px}.toolbar{display:flex;gap:10px;flex-wrap:wrap}.search,.button{border:1px solid var(--line);background:#fff;border-radius:10px;padding:11px 13px;font-size:14px}.search{min-width:280px;flex:1}.button{cursor:pointer}.button.active{border-color:#95b8ef;background:#eaf2ff;color:#174ea6}.hint{font-size:12px;color:var(--muted);margin:10px 0 14px}.graph{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;overflow:auto}.graph-grid{min-width:900px;display:grid;grid-template-columns:230px 260px 1fr;gap:34px;align-items:start}.column-title{font-size:12px;font-weight:700;color:#66758c;margin:0 0 10px;text-transform:uppercase;letter-spacing:.06em}.hub,.service,.area,.role{border:1px solid var(--line);background:var(--card);border-radius:12px}.hub{background:#edf4ff;border-color:#8eb0ef;padding:20px;text-align:center;font-weight:800;font-size:18px;margin-top:114px}.hub small,.service small,.area small{display:block;color:var(--muted);font-weight:400;font-size:12px;margin-top:6px}.service{padding:14px;margin:0 0 12px;cursor:pointer;position:relative}.service:hover,.service.selected{border-color:#2563eb;box-shadow:0 5px 16px rgba(37,99,235,.12)}.service:before{content:"";position:absolute;left:-35px;top:50%;width:34px;border-top:1px solid #9db7e6}.area{padding:13px;margin:0 0 12px;background:#f9fbff;cursor:pointer}.area.selected{border-color:#2563eb}.area b{font-size:14px}.roles{display:grid;grid-template-columns:repeat(2,minmax(175px,1fr));gap:10px}.role{padding:12px;cursor:pointer;min-height:88px}.role:hover,.role.selected{outline:2px solid #8bb1f6;border-color:#8bb1f6}.role h3{font-size:14px;margin:0 0 7px;line-height:1.35}.tag{font-size:11px;border-radius:999px;padding:3px 7px;display:inline-block}.critical{background:#fee4e2;color:#b42318}.high{background:#ffead5;color:#a34800}.medium{background:#fef3c7;color:#8a5b00}.low{background:#dcfae6;color:#14724a}.layout{display:grid;grid-template-columns:1fr 330px;gap:16px;margin-top:16px}.list,.detail{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}.list-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}.item{border:1px solid var(--line);border-radius:10px;padding:12px;cursor:pointer}.item:hover{border-color:#8db1ef}.detail .empty{color:var(--muted);line-height:1.7}.detail h2{font-size:19px;margin:0 0 8px}.detail p{font-size:13px;line-height:1.6;color:#40516a}.meta{font-size:12px;color:var(--muted)}@media(max-width:860px){.layout{grid-template-columns:1fr}.detail{position:static}.graph-grid{min-width:780px}}@media(max-width:560px){.wrap{padding:14px}.search{min-width:100%}.roles{grid-template-columns:1fr}}
</style></head><body><header><h1>Microsoft Entra RBAC 지도</h1><p>서비스 · 기능영역 · 역할의 관계를 가독성 있게 확인하는 오프라인 도구입니다.</p></header><main class="wrap"><div class="toolbar"><input id="q" class="search" placeholder="역할명 또는 키워드 검색 (예: MFA, PIM, SharePoint, Azure)"/><button id="reset" class="button">초기화</button></div><div class="hint">그래프는 역할 관계를 빠르게 찾기 위한 탐색 화면입니다. 실제 운영 권한은 공식 역할 설명과 테넌트 설정을 함께 확인하십시오.</div><section class="graph"><div class="graph-grid"><div><p class="column-title">중심</p><div class="hub">Entra ID<small>Microsoft 권한 관리 허브</small></div></div><div><p class="column-title">서비스 / 기능영역</p><div id="services"></div></div><div><p class="column-title">연결 역할</p><div id="roles" class="roles"></div></div></div></section><section class="layout"><section class="list"><p class="column-title">전체 역할</p><div id="list" class="list-grid"></div></section><aside id="detail" class="detail"><div class="empty">서비스 또는 역할을 선택하면 목적, 주요 작업, 최소 권한 관점을 표시합니다.</div></aside></section></main><script>
const data=[
['Global Administrator','전역 관리자','핵심/테넌트','critical','테넌트와 Microsoft 서비스 전반 관리','테넌트 설정, 모든 역할, 앱 동의','업무별 전용 역할과 PIM 적격 할당을 우선 검토'],
['Global Reader','전역 읽기 권한자','핵심/테넌트','high','전체 구성 읽기 전용','테넌트 구성 및 상태 조회','서비스별 Reader 역할을 우선 검토'],
['Privileged Role Administrator','권한 있는 역할 관리자','PIM/역할','critical','Entra 역할과 PIM 관리','역할 할당, PIM 정책, 승인 흐름','상시 부여 대신 PIM 사용'],
['Authentication Administrator','인증 관리자','인증/MFA','high','비관리자 인증 방법 관리','MFA 재등록, 인증 방법 초기화','관리자 계정 작업 범위 별도 확인'],
['Conditional Access Administrator','조건부 액세스 관리자','보안/조건부 액세스','critical','조건부 액세스 정책 관리','정책 생성, 수정, 명명된 위치','긴급 액세스 계정 및 Report-only 검증'],
['Security Reader','보안 읽기 권한자','보안/조건부 액세스','medium','보안 정보와 보고서 읽기','위험 사용자, 로그인 위험, 보안 보고서','수정이 없으면 Administrator 대신 사용'],
['User Administrator','사용자 관리자','사용자/그룹','high','사용자와 그룹 관리','사용자 생성·수정, 그룹 멤버십','라이선스 전용이면 License Administrator 검토'],
['Groups Administrator','그룹 관리자','사용자/그룹','medium','그룹과 관련 설정 관리','그룹 생성, 소유자·구성원 관리','사용자 계정 관리는 포함하지 않음'],
['Application Administrator','애플리케이션 관리자','앱/서비스 주체','critical','앱 등록과 엔터프라이즈 앱 관리','앱 등록, 서비스 주체, 자격 증명','앱 권한 상승 위험 검토'],
['Cloud Device Administrator','클라우드 디바이스 관리자','디바이스','medium','Entra 디바이스 관리','디바이스 상태 변경, BitLocker 키 조회','Intune 정책은 별도 역할 사용'],
['Intune Administrator','Intune 관리자','디바이스','high','Intune 관리','준수 정책, 구성 프로필, 앱 배포','조건부 액세스 역할과 구분'],
['Hybrid Identity Administrator','하이브리드 ID 관리자','하이브리드','high','하이브리드 ID 구성 관리','Connect, Cloud Sync, PTA','온프레미스 변경 절차와 연계'],
['Identity Governance Administrator','ID 거버넌스 관리자','거버넌스','high','Access Review와 Entitlement 관리','Access package, Catalog, Review','ID Governance 라이선스 확인'],
['Teams Administrator','Teams 관리자','M365 워크로드','high','Teams 서비스 정책 관리','회의, 메시징, 통화 정책','외부 협업은 별도 역할 검토'],
['Exchange Administrator','Exchange 관리자','M365 워크로드','high','Exchange Online 관리','사서함, 메일 흐름, 커넥터','전송 규칙 영향도 검토'],
['SharePoint Administrator','SharePoint 관리자','M365 워크로드','high','SharePoint/OneDrive 테넌트 관리','사이트, 공유 정책, OneDrive','사이트별 권한과 테넌트 정책 구분'],
['Global Secure Access Administrator','Global Secure Access 관리자','네트워크/ZTNA','high','Entra Internet/Private Access 관리','트래픽 정책, 네트워크 보안','단계 적용과 롤백 경로 필요'],
['Reports Reader','보고서 읽기 권한자','감사/보고','medium','감사와 사용 보고서 조회','Sign-in, Audit, 사용량 보고서','조사 목적의 읽기 역할']
].map((r,i)=>({id:i+1,en:r[0],ko:r[1],area:r[2],risk:r[3],summary:r[4],tasks:r[5],least:r[6]}));
const serviceMap={
'핵심/테넌트':'Entra ID','PIM/역할':'Entra ID','인증/MFA':'Entra ID','보안/조건부 액세스':'Microsoft Defender','사용자/그룹':'Microsoft 365 관리','앱/서비스 주체':'Entra ID','디바이스':'Intune','하이브리드':'Entra ID','거버넌스':'Entra ID','M365 워크로드':'Microsoft 365','네트워크/ZTNA':'Global Secure Access','감사/보고':'Microsoft 365 관리'};
let activeService='',activeArea='',selected=null;const $=s=>document.querySelector(s);const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const riskLabel=r=>({critical:'매우 높음',high:'높음',medium:'중간',low:'낮음'})[r];
function areas(){return [...new Set(data.map(x=>x.area))]};function filtered(){const q=$('#q').value.trim().toLowerCase();return data.filter(x=>(!activeService||serviceMap[x.area]===activeService)&&(!activeArea||x.area===activeArea)&&(!q||Object.values(x).join(' ').toLowerCase().includes(q)))}
function render(){const svc=[...new Set(Object.values(serviceMap))];$('#services').innerHTML=svc.map(s=>{const n=data.filter(x=>serviceMap[x.area]===s).length;return `<div class="service ${activeService===s?'selected':''}" data-service="${s}"><b>${s}</b><small>${n}개 역할 · 클릭하여 필터</small></div>`}).join('')+areas().map(a=>`<div class="area ${activeArea===a?'selected':''}" data-area="${a}"><b>${a}</b><small>${data.filter(x=>x.area===a).length}개 역할</small></div>`).join('');const list=filtered();$('#roles').innerHTML=list.slice(0,8).map(x=>`<article class="role ${selected===x.id?'selected':''}" data-role="${x.id}"><h3>${esc(x.ko)}</h3><span class="tag ${x.risk}">${riskLabel(x.risk)}</span></article>`).join('')||'<div class="meta">조건에 맞는 역할이 없습니다.</div>';$('#list').innerHTML=list.map(x=>`<article class="item" data-role="${x.id}"><b>${esc(x.ko)}</b><div class="meta">${esc(x.area)} · ${riskLabel(x.risk)}</div></article>`).join('')||'<div class="meta">조건에 맞는 역할이 없습니다.</div>';document.querySelectorAll('[data-service]').forEach(e=>e.onclick=()=>{activeService=activeService===e.dataset.service?'':e.dataset.service;activeArea='';selected=null;render()});document.querySelectorAll('[data-area]').forEach(e=>e.onclick=()=>{activeArea=activeArea===e.dataset.area?'':e.dataset.area;activeService='';selected=null;render()});document.querySelectorAll('[data-role]').forEach(e=>e.onclick=()=>{selected=+e.dataset.role;showDetail();render()});if(selected)showDetail()}
function showDetail(){const x=data.find(v=>v.id===selected);if(!x)return;$('#detail').innerHTML=`<span class="tag ${x.risk}">${riskLabel(x.risk)}</span><h2>${esc(x.ko)}</h2><div class="meta">${esc(x.en)} · ${esc(x.area)} · ${esc(serviceMap[x.area])}</div><h3>역할 목적</h3><p>${esc(x.summary)}</p><h3>주요 작업</h3><p>${esc(x.tasks)}</p><h3>최소 권한 관점</h3><p>${esc(x.least)}</p>`}
$('#q').oninput=render;$('#reset').onclick=()=>{activeService='';activeArea='';selected=null;$('#q').value='';$('#detail').innerHTML='<div class="empty">서비스 또는 역할을 선택하면 목적, 주요 작업, 최소 권한 관점을 표시합니다.</div>';render()};render();
</script></body></html>
